name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-build-smoke:
    name: Quality, build, smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://hnmodeq-techbox.vercel.app
        run: pnpm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        env:
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          CI: 'true'
        run: pnpm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

  optional-db-checks:
    name: Optional DB/content checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-build-smoke

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BLOB_CHECK_LIMIT: 200

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Skip DB checks when DATABASE_URL is not configured
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "DATABASE_URL secret is not configured; skipping optional DB/content checks."

      - name: Validate content
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm run check:content

      - name: Validate database consistency
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm run check:db

      - name: Validate Blob URLs
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm run check:blob